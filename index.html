<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Memoria · Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>

  <!-- 极光背景层（贯穿全局） -->
  <div class="aurora-bg"></div>

  <!-- 顶部状态栏 -->
  <header class="top-bar">
    <div class="top-bar-inner">
      <div class="brand">
        <span class="brand-mem">Memoria</span>
        <span class="brand-sep">·</span>
        <span class="brand-net">Network</span>
      </div>
      <div class="stats">
        <div class="stat stat-keeper" title="守护者档案 · 点击进入「我的」" onclick="UI.switchTab('me')">
          <svg class="stat-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21v-2a4 4 0 014-4h8a4 4 0 014 4v2"/></svg>
          <span id="keeper-tag">#</span>
        </div>
        <div class="stat stat-shop" title="Crystal Station" onclick="UI.openCrystalStation()">
          <svg class="stat-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2 L13.6 10.4 22 12 L13.6 13.6 12 22 L10.4 13.6 2 12 L10.4 10.4 Z"/></svg>
        </div>
        <button class="settings-btn" id="settings-btn" title="设置" aria-label="设置">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33h0a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51h0a1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82v0a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- 设置面板 -->
  <div class="settings-panel" id="settings-panel">
    <div class="settings-head">
      <h3>设置</h3>
      <button class="settings-close" id="settings-close" aria-label="关闭">✕</button>
    </div>
    <div class="settings-row">
      <div class="settings-label">
        <span class="ic">🔊</span>
        <div><div class="t">音效</div><div class="s">共鸣 / 揭晓 / 点击</div></div>
      </div>
      <label class="toggle"><input type="checkbox" id="toggle-sfx"><span class="slider"></span></label>
    </div>
    <div class="settings-row">
      <div class="settings-label">
        <span class="ic">📳</span>
        <div><div class="t">震动反馈</div><div class="s">Resonance 揭晓 / 关键交互</div></div>
      </div>
      <label class="toggle"><input type="checkbox" id="toggle-vibrate"><span class="slider"></span></label>
    </div>
    <div class="settings-row">
      <div class="settings-label">
        <span class="ic">⚡</span>
        <div><div class="t">快速共鸣</div><div class="s">十连 Signal/Echo 跳仪式 · Resonance 仪式保留</div></div>
      </div>
      <label class="toggle"><input type="checkbox" id="toggle-fast"><span class="slider"></span></label>
    </div>
  </div>
  <div class="settings-mask" id="settings-mask"></div>

  <!-- 主内容区 -->
  <main class="main-content">

    <!-- ============ 卡池 tab：UP 合集 coser 列表 ============ -->
    <section id="page-channel" class="tab-page active">
      <div class="channel-head">
        <h2 class="ch-h2">UP 合集</h2>
        <p class="ch-h-sub">"对上频率的瞬间，叫做共鸣"</p>
      </div>
      <div id="channel-list" class="channel-list"></div>
    </section>

    <!-- ============ 图鉴 tab：她们的档案 ============ -->
    <section id="page-archive" class="tab-page">
      <div id="archive-content"></div>
    </section>

    <!-- ============ 我的 tab：守护者档案 ============ -->
    <section id="page-me" class="tab-page">
      <div id="me-content"></div>
    </section>

    <!-- ============ 频率战 tab：内嵌战斗（不跳转）============ -->
    <section id="page-battle" class="tab-page">
      <div id="battle-content"></div>
    </section>

  </main>

  <!-- 底部导航：4 tab -->
  <nav class="bottom-nav">
    <button class="tab-btn" data-tab="battle">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 17.5l3-3 5 5-3 3z"/><path d="M21 3l-7.5 7.5"/><path d="M9.5 6.5l-3 3-5-5 3-3z"/><path d="M3 21l7.5-7.5"/><path d="M15 4l5 5"/><path d="M4 15l5 5"/></svg>
      <span class="nav-label">频率战</span>
    </button>
    <button class="tab-btn active" data-tab="channel">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="11"/></svg>
      <span class="nav-label">卡池</span>
    </button>
    <button class="tab-btn" data-tab="archive">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><line x1="9" y1="7" x2="16" y2="7"/></svg>
      <span class="nav-label">图鉴</span>
    </button>
    <button class="tab-btn" data-tab="me">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-2a4 4 0 014-4h8a4 4 0 014 4v2"/></svg>
      <span class="nav-label">我的</span>
    </button>
  </nav>

  <!-- 抽卡结果弹窗 -->
  <div id="pull-overlay" class="overlay">
    <div class="pull-results-wrapper">
      <div class="pull-results" id="pull-results"></div>
      <p class="overlay-hint">点击卡片查看详情 | 点击背景关闭</p>
    </div>
  </div>

  <!-- 卡牌详情弹窗 -->
  <div id="detail-overlay" class="overlay">
    <div id="detail-content" class="detail-content"></div>
  </div>

  <!-- Crystal Station 商店 overlay -->
  <div id="crystal-station" class="cs-overlay">
    <div id="crystal-station-content" class="cs-content"></div>
  </div>

  <!-- 关于 Memoria overlay（screen 16） -->
  <div id="about-overlay" class="about-overlay">
    <div id="about-content" class="about-content"></div>
  </div>

  <!-- 合规公示 overlay（screen 22） -->
  <div id="legal-overlay" class="legal-overlay">
    <div id="legal-content" class="legal-content"></div>
  </div>

  <!-- 守护者榜 overlay（screen 18） -->
  <div id="rank-overlay" class="rank-overlay">
    <div id="rank-content" class="rank-content"></div>
  </div>

  <!-- 欧气统计 overlay（screen 19） -->
  <div id="luck-overlay" class="luck-overlay">
    <div id="luck-content" class="luck-content"></div>
  </div>

  <!-- Battle Skin Picker（频率战皮肤选择器 modal） -->
  <div id="bs-picker-modal" class="bs-picker-overlay"></div>

  <!-- 海报生成 canvas（隐藏） -->
  <canvas id="poster-canvas" style="display:none" width="750" height="1100"></canvas>

  <script src="js/cosers.js"></script>
  <script src="js/state.js"></script>
  <script src="js/sfx.js"></script>
  <script src="js/gacha.js"></script>
  <script src="js/battle-engine.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
