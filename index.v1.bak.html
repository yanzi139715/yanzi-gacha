<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Memoria · 妍子</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>
  <!-- 顶部状态栏 -->
  <header class="top-bar">
    <div class="top-bar-inner">
      <div class="brand">Memoria · 妍子</div>
      <div class="stats">
        <div class="stat" title="抽卡券">
          <svg class="stat-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          <span id="ticket-count">0</span>
        </div>
        <div class="stat" title="Beacon">
          <svg class="stat-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><text x="12" y="16" text-anchor="middle" fill="currentColor" stroke="none" font-size="11" font-weight="700">$</text></svg>
          <span id="coin-count">0</span>
        </div>
        <div class="stat stat-shard" title="共鸣碎片 Echo Shard">
          <svg class="stat-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2 L13.6 10.4 22 12 L13.6 13.6 12 22 L10.4 13.6 2 12 L10.4 10.4 Z"/></svg>
          <span id="shard-count">0</span>
        </div>
        <div class="stat" title="SSR保底">
          <svg class="stat-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9"/></svg>
          <span id="pity-count">0/90</span>
        </div>
        <div class="stat" title="已收集">
          <svg class="stat-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
          <span id="collection-count">0</span>
        </div>
        <button class="settings-btn" id="settings-btn" title="设置" aria-label="设置">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33h0a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51h0a1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82v0a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- 设置面板 -->
  <div class="settings-panel" id="settings-panel">
    <div class="settings-head">
      <h3>设置</h3>
      <button class="settings-close" id="settings-close" aria-label="关闭">✕</button>
    </div>
    <div class="settings-row">
      <div class="settings-label">
        <span class="ic">🔊</span>
        <div>
          <div class="t">音效</div>
          <div class="s">抽卡 / 揭晓 / 点击</div>
        </div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-sfx">
        <span class="slider"></span>
      </label>
    </div>
    <div class="settings-row">
      <div class="settings-label">
        <span class="ic">📳</span>
        <div>
          <div class="t">震动反馈</div>
          <div class="s">SSR 揭晓 / 关键交互</div>
        </div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-vibrate">
        <span class="slider"></span>
      </label>
    </div>
    <div class="settings-row">
      <div class="settings-label">
        <span class="ic">⚡</span>
        <div>
          <div class="t">快速抽卡</div>
          <div class="s">十连 R/SR 跳仪式 · SSR 仪式保留</div>
        </div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-fast">
        <span class="slider"></span>
      </label>
    </div>
  </div>
  <div class="settings-mask" id="settings-mask"></div>

  <!-- 主内容区 -->
  <main class="main-content">

    <!-- 抽卡页 -->
    <section id="page-gacha" class="tab-page active">

      <!-- 卡池切换（前置，关键导航） -->
      <div class="pool-tabs" id="pool-tabs"></div>

      <!-- 主推 Banner（角色立绘 + UP 标 + 倒计时） -->
      <div class="banner banner-v2" id="banner">
        <div class="banner-mask"></div>
        <div class="banner-overlay">
          <div class="banner-up-tag" id="banner-up-tag" style="display:none">UP · 限定</div>
          <h1 id="pool-title">妍子Cosplay抽卡集</h1>
          <p id="pool-subtitle">收集你的本命角色卡牌</p>
          <div id="pool-countdown" class="pool-countdown" style="display:none"></div>
        </div>
      </div>

      <div class="gacha-pool">
        <div class="pity-row">
          <div id="pity-counter" class="pity-counter">距保底: 0/90</div>
          <div id="soft-pity-hint" class="soft-pity-hint" style="display:none"></div>
        </div>
        <div id="pool-expired-msg" class="pool-expired" style="display:none"></div>

        <div class="rate-strip">
          <span class="rate-chip rate-ssr"><span class="rate-dot"></span>SSR 3%</span>
          <span class="rate-chip rate-sr"><span class="rate-dot"></span>SR 15%</span>
          <span class="rate-chip rate-r"><span class="rate-dot"></span>R 82%</span>
        </div>

        <div class="gacha-buttons">
          <button id="btn-single" class="btn-pull btn-single">
            <span class="btn-glyph">★</span>
            <span class="btn-main">
              <span class="btn-text">单抽</span>
              <span class="btn-cost">1券 · 或 10Beacon</span>
            </span>
          </button>
          <button id="btn-ten" class="btn-pull btn-ten">
            <span class="btn-glyph">✦✦</span>
            <span class="btn-main">
              <span class="btn-text">十连抽</span>
              <span class="btn-cost">10券 · 或 100Beacon</span>
            </span>
            <span class="btn-badge">保底SR</span>
          </button>
        </div>
      </div>

      <!-- 当前卡池角色 -->
      <div class="recent-section">
        <h2 class="section-title">当前卡池角色 <span class="section-hint">点击查看图鉴</span></h2>
        <div class="char-preview" id="char-preview"></div>
      </div>
    </section>

    <!-- 图鉴页 = 妍子的档案 -->
    <section id="page-collection" class="tab-page">
      <!-- Coser 档案区（由 JS 渲染：标题 + 守护进度 + 关于 + 频率战 + 切换主皮肤） -->
      <div id="coser-profile-block"></div>
      <div id="collection-grid" class="collection-grid"></div>
    </section>

    <!-- 任务页 -->
    <section id="page-tasks" class="tab-page">
      <div class="page-header">
        <h2>任务中心</h2>
        <p class="page-subtitle">完成任务获取抽卡券</p>
      </div>
      <div id="task-list" class="task-list"></div>
    </section>

    <!-- 商店页 -->
    <section id="page-shop" class="tab-page">
      <div class="page-header">
        <h2>商店</h2>
        <p class="page-subtitle">购买Beacon，解锁更多抽卡机会</p>
      </div>
      <div id="shop-list" class="shop-list"></div>
    </section>

  </main>

  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <button class="tab-btn" data-battle-link>
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 17.5l3-3 5 5-3 3z"/><path d="M21 3l-7.5 7.5"/><path d="M9.5 6.5l-3 3-5-5 3-3z"/><path d="M3 21l7.5-7.5"/><path d="M15 4l5 5"/><path d="M4 15l5 5"/></svg>
      <span class="nav-label">频率</span>
    </button>
    <button class="tab-btn active" data-tab="gacha">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="11"/></svg>
      <span class="nav-label">卡池</span>
    </button>
    <button class="tab-btn" data-tab="collection">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><line x1="9" y1="7" x2="16" y2="7"/><line x1="9" y1="11" x2="14" y2="11"/></svg>
      <span class="nav-label">图鉴</span>
    </button>
    <button class="tab-btn" data-tab="tasks">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span class="nav-label">任务</span>
    </button>
    <button class="tab-btn" data-tab="shop">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
      <span class="nav-label">商店</span>
    </button>
  </nav>

  <!-- 抽卡结果弹窗 -->
  <div id="pull-overlay" class="overlay">
    <div class="pull-results-wrapper">
      <div class="pull-results" id="pull-results"></div>
      <p class="overlay-hint">点击卡片查看详情 | 点击背景关闭</p>
    </div>
  </div>

  <!-- 卡牌详情弹窗 -->
  <div id="detail-overlay" class="overlay">
    <div id="detail-content" class="detail-content"></div>
  </div>

  <!-- 海报生成用的隐藏Canvas -->
  <canvas id="poster-canvas" style="display:none" width="750" height="1100"></canvas>

  <script src="js/cards.js"></script>
  <script src="js/sfx.js"></script>
  <script src="js/gacha.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
