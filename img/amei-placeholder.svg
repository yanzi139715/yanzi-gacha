<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 533" width="400" height="533">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD24A" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#FFB8D9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7BC9FF" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.6"/>
    </pattern>
  </defs>
  <rect width="400" height="533" fill="url(#g)"/>
  <rect width="400" height="533" fill="url(#grid)"/>
  <rect width="400" height="533" fill="url(#glow)"/>
  <!-- 几何装饰：六边形外环 -->
  <g transform="translate(200,230)" opacity="0.35" stroke="white" stroke-width="1.4" fill="none">
    <polygon points="0,-110 95,-55 95,55 0,110 -95,55 -95,-55"/>
    <polygon points="0,-85 74,-42 74,42 0,85 -74,42 -74,-42"/>
    <line x1="0" y1="-110" x2="0" y2="-85"/>
    <line x1="95" y1="-55" x2="74" y2="-42"/>
    <line x1="95" y1="55" x2="74" y2="42"/>
    <line x1="0" y1="110" x2="0" y2="85"/>
    <line x1="-95" y1="55" x2="-74" y2="42"/>
    <line x1="-95" y1="-55" x2="-74" y2="-42"/>
  </g>
  <!-- 中央 A 字 -->
  <text x="200" y="278" font-size="220" font-family="Cormorant Garamond, serif" font-style="italic" font-weight="600" text-anchor="middle" fill="white" opacity="0.96" style="text-shadow:0 0 30px rgba(255,255,255,0.5)">A</text>
  <!-- 副标 -->
  <text x="200" y="360" font-size="14" font-family="JetBrains Mono, monospace" letter-spacing="8" text-anchor="middle" fill="white" opacity="0.7">VIRTUAL · AI</text>
  <text x="200" y="395" font-size="11" font-family="LXGW WenKai, Noto Serif SC, serif" letter-spacing="6" text-anchor="middle" fill="white" opacity="0.6">虚 拟 频 率 · 校 准 中</text>
  <!-- 底部光带 -->
  <rect x="0" y="500" width="400" height="33" fill="rgba(0,0,0,0.25)"/>
  <line x1="100" y1="510" x2="300" y2="510" stroke="white" stroke-width="1" opacity="0.4"/>
  <text x="200" y="525" font-size="10" font-family="JetBrains Mono, monospace" letter-spacing="3" text-anchor="middle" fill="white" opacity="0.55">MEMORIA · NETWORK</text>
</svg>
